services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: discbot-lavalink
    restart: unless-stopped
    volumes:
      - ./docker/lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - lavalink-logs:/opt/Lavalink/logs
    ports:
      - "12333:12333"
    networks:
      - discbot

  bot:
    build: .
    container_name: discbot
    restart: unless-stopped
    depends_on:
      - lavalink
    env_file:
      - .env
    environment:
      # Inside Compose the bot reaches Lavalink by service name, not 127.0.0.1.
      LAVALINK_HOST: lavalink
      LAVALINK_PORT: 12333
      LAVALINK_SECURE: "false"
      DATABASE_PATH: /app/data/musicbot.db
      # Expose dashboard outside the container when DASHBOARD_ENABLED=true.
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 18080
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "18080:18080"
    networks:
      - discbot

networks:
  discbot:
    driver: bridge

volumes:
  lavalink-logs:
