server:
  port: 12333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: true
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    youtube:
      # Cookie file path for YouTube authentication (fixes YouTube restrictions)
      cookieFile: "/opt/Lavalink/ytcookies.txt"
    filters:
      volume: true
      equalizer: true
      karaoke: false
      timescale: true
      tremolo: false
      vibrato: false
      distortion: false
      rotation: false
      channelMix: false
      lowPass: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  # Optional Spotify support. Uncomment and set credentials if the plugin is
  # desired; keep disabled by default for a reliable first container boot.
  # - name: spotify-plugin
  #   dependency: "com.github.lavalink-devs:lavalink-spotify-plugin:v1.3.0"
  #   repository: "https://jitpack.io"
  #   spotify:
  #     clientId: "your_spotify_client_id"
  #     clientSecret: "your_spotify_client_secret"
  #     countryCode: "US"

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 1GB
