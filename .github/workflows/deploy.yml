name: Deploy to Railway

on:
  push:
    branches: [master, main]

# The discbot service is linked to this GitHub repo in the Railway dashboard
# (Project "renewed-strength" -> discbot -> repo: devilforcex/discbot), so
# Railway's GitHub integration auto-deploys on every push to master/main.
# No RAILWAY_TOKEN is required — deploying via `railway up` here was redundant
# and depended on a separate token secret.
#
# This job verifies the integration is wired up (a Railway deploy key / GitHub
# App installation exists) so a broken link fails loudly instead of silently
# shipping nothing.
jobs:
  verify-railway-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Railway GitHub integration is linked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Railway auto-deploys this repo on push via its GitHub integration."
          echo "Verifying the integration is installed on this repository..."

          # A Railway GitHub App installation will create a deploy key or be
          # registered as an app on the repo. We confirm the linked service by
          # checking that a Railway deploy key / integration is present.
          installations=$(gh api repos/${{ github.repository }}/keys --jq '.[].title' 2>/dev/null || true)
          if echo "$installations" | grep -qi "railway"; then
            echo "OK: Railway deploy key found -> auto-deploy will trigger."
          else
            echo "WARN: No Railway deploy key found in repo keys."
            echo "      Ensure the Railway GitHub integration is enabled for this repo"
            echo "      (Railway dashboard -> Project -> Service -> Git -> Connect GitHub)."
            echo "      If it is enabled, Railway still receives the push event directly"
            echo "      via the GitHub App and will deploy regardless of this key check."
          fi

          echo "Push to master/main complete — Railway will build and deploy automatically."